<!DOCTYPE html>
<html lang="ar" dir="rtl" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الندى بلاست | Al-Nada Plast</title>
    
    <!-- Favicon (شعار الموقع في علامة التبويب) -->
    <link rel="icon" type="image/jpeg" href="1000412269_2.jpg">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { fontFamily: { sans: ['Cairo', 'sans-serif'] } } }
        }
    </script>
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap');
        .lang-en { display: none; }
        body { transition: background-color 0.3s ease; }
    </style>
</head>
<body class="bg-gray-100 dark:bg-gray-900 text-gray-800 dark:text-gray-100 min-h-screen p-4 flex justify-center items-start">

    <!-- Card Container -->
    <div class="max-w-md w-full bg-white dark:bg-gray-800 rounded-3xl shadow-2xl overflow-hidden border border-gray-200 dark:border-gray-700">
        
        <!-- Header Controls -->
        <div class="flex justify-between items-center p-4 bg-gray-50 dark:bg-gray-800/50">
            <button onclick="toggleTheme()" class="w-10 h-10 rounded-full bg-gray-200 dark:bg-gray-700 flex items-center justify-center hover:scale-105 transition">
                <i id="theme-icon" class="fa-solid fa-moon"></i>
            </button>
            <button onclick="toggleLang()" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-full text-sm font-bold shadow-md transition">
                <span id="lang-btn">English</span>
            </button>
        </div>

        <!-- Branding -->
        <div class="text-center p-6 border-b border-gray-100 dark:border-gray-700">
            <img src="1000412269_2.jpg" alt="Logo" class="w-28 h-28 mx-auto rounded-2xl shadow-lg mb-4">
            <h1 class="text-2xl font-bold mb-1"><span class="lang-ar">الندى بلاست</span><span class="lang-en">Al-Nada Plast</span></h1>
            <p class="text-gray-500 dark:text-gray-400 text-sm mb-3">
                <span class="lang-ar">للتجارة والتوزيع لمواد التعبئة والتغليف والمطبوعات</span>
                <span class="lang-en">Trade & Distribution of Packaging Materials & Prints</span>
            </p>
        </div>

        <!-- Address -->
        <a href="https://maps.app.goo.gl/azVw1khGMuYoV8xd9" target="_blank" class="block p-4 text-center hover:bg-gray-50 dark:hover:bg-gray-700/50 transition border-b border-gray-100 dark:border-gray-700">
            <i class="fa-solid fa-location-dot text-red-500"></i>
            <span class="text-sm font-semibold text-gray-700 dark:text-gray-300">6 أكتوبر - ميدان الحصري - برج (ج)</span>
        </a>

        <!-- Services -->
        <div class="p-6 grid grid-cols-1 gap-4">
            <button onclick="openActionModal('01112611103')" class="flex items-center justify-between bg-orange-500 hover:bg-orange-600 text-white p-5 rounded-2xl shadow-lg transition transform hover:scale-[1.02]">
                <div class="flex items-center gap-3"><i class="fa-solid fa-truck-fast text-2xl"></i> <span class="font-bold text-sm"><span class="lang-ar">الطلب والتوصيل</span><span class="lang-en">Orders & Delivery</span></span></div>
                <div class="font-mono text-lg font-bold">01112611103</div>
            </button>
            
            <button onclick="openActionModal('01044200047')" class="flex items-center justify-between bg-blue-500 hover:bg-blue-600 text-white p-5 rounded-2xl shadow-lg transition transform hover:scale-[1.02]">
                <div class="flex items-center gap-3"><i class="fa-solid fa-handshake text-2xl"></i> <span class="font-bold text-sm"><span class="lang-ar">المبيعات والمشتريات</span><span class="lang-en">Sales & Purchasing</span></span></div>
                <div class="font-mono text-lg font-bold">01044200047</div>
            </button>
            
            <a href="https://ipn.eg/C/Q/abdelnaby18/instapay?ISIGN=23052603MEUCIHyaG0WF5uuVOFh89P9/SUVcTD1tDGnywMjqlbrn3mESAiEAs6Nsk1CujAcE/zIKo2QuzeWQco50vBeiKZ14b+3Uk4Q=" target="_blank" class="flex items-center justify-between bg-purple-600 hover:bg-purple-700 text-white p-5 rounded-2xl shadow-lg transition transform hover:scale-[1.02]">
                <div class="flex items-center gap-3"><i class="fa-solid fa-wallet text-2xl"></i> <span class="font-bold text-sm">InstaPay (انستا باي)</span></div>
                <div class="font-mono text-lg font-bold">01115949155</div>
            </a>
            
            <button onclick="openActionModal('01027760090')" class="flex items-center justify-between bg-red-600 hover:bg-red-700 text-white p-5 rounded-2xl shadow-lg transition transform hover:scale-[1.02]">
                <div class="flex items-center gap-3"><i class="fa-solid fa-money-bill-wave text-2xl"></i> <span class="font-bold text-sm">Vodafone Cash (فودافون كاش)</span></div>
                <div class="font-mono text-lg font-bold">01027760090</div>
            </button>
        </div>

        <!-- Footer Complaints -->
        <div class="bg-gray-100 dark:bg-gray-700/50 p-6 border-t border-gray-200 dark:border-gray-700 text-center">
            <h3 class="text-gray-600 dark:text-gray-300 font-bold mb-3 text-sm">الشكاوى والمقترحات (للمدير)</h3>
            <button onclick="openActionModal('01027760090')" class="w-full bg-white dark:bg-gray-800 border-2 border-gray-300 dark:border-gray-600 py-3 rounded-xl font-bold hover:border-blue-500 transition flex items-center justify-center gap-2 text-lg">
                <i class="fa-solid fa-phone text-blue-600"></i> 01027760090
            </button>
        </div>
    </div>

    <!-- Modal (نافذة الاختيار) -->
    <div id="actionModal" class="hidden fixed inset-0 z-50 bg-black/50 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="bg-white dark:bg-gray-800 rounded-3xl p-6 w-full max-w-xs shadow-2xl animate-in fade-in zoom-in duration-200">
            <h3 class="text-center font-bold text-lg mb-6 dark:text-white">اختر وسيلة التواصل</h3>
            <div class="space-y-3">
                <a id="callLink" href="#" class="flex items-center justify-center gap-3 w-full bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700">
                    <i class="fa-solid fa-phone"></i> اتصال هاتفي
                </a>
                <a id="waLink" href="#" target="_blank" class="flex items-center justify-center gap-3 w-full bg-green-500 text-white py-3 rounded-xl font-bold hover:bg-green-600">
                    <i class="fa-brands fa-whatsapp"></i> واتساب
                </a>
                <button onclick="closeModal()" class="w-full text-gray-500 mt-4 font-bold">إلغاء</button>
            </div>
        </div>
    </div>

    <!-- Script -->
    <script>
        function toggleLang() {
            const isArabic = document.documentElement.dir === 'rtl';
            document.documentElement.dir = isArabic ? 'ltr' : 'rtl';
            document.documentElement.lang = isArabic ? 'en' : 'ar';
            document.getElementById('lang-btn').innerText = isArabic ? 'العربية' : 'English';
            document.querySelectorAll('.lang-ar').forEach(e => e.style.display = isArabic ? 'none' : '');
            document.querySelectorAll('.lang-en').forEach(e => e.style.display = isArabic ? '' : 'none');
        }

        function toggleTheme() {
            document.documentElement.classList.toggle('dark');
            const icon = document.getElementById('theme-icon');
            icon.classList.toggle('fa-moon');
            icon.classList.toggle('fa-sun');
        }

        function openActionModal(number) {
            const modal = document.getElementById('actionModal');
            const callLink = document.getElementById('callLink');
            const waLink = document.getElementById('waLink');
            
            callLink.href = `tel:${number}`;
            waLink.href = `https://wa.me/20${number.replace(/^0/, '')}`;
            
            modal.classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('actionModal').classList.add('hidden');
        }
    </script>
</body>
</html>
